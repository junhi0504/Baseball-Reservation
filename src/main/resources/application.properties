# 1. 프로젝트 기본 설정
spring.application.name=baseball-reservation

# 2. MySQL 연결 설정
# 'baseball_db'라는 이름의 데이터베이스를 MySQL Workbench에서 미리 생성해야 합니다.
spring.datasource.url=jdbc:mysql://localhost:3306/baseball_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1504

# MySQL 드라이버 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. JPA / Hibernate 설정 (중요)
# update: 기존 테이블은 유지하고 변경된 부분만 반영 (실무 권장)
# create: 실행할 때마다 테이블을 새로 만듦 (연습 시 데이터 초기화용으로 좋음)
spring.jpa.hibernate.ddl-auto=update

# 실행되는 SQL 쿼리를 콘솔에 예쁘게 출력
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 4. 초기 데이터 실행 설정 (data.sql이나 InitData 사용 시)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true